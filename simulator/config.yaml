# ---------------------------------------------------------
# 시뮬레이터 동작 설정 (하드코딩 금지 요구사항 충족)
# ---------------------------------------------------------

# 트래픽 분배 비율 (현실적인 고객 분포)
persona_ratios:
  "트렌드세터": 0.15
  "실용주의자": 0.25
  "가성비추구": 0.25
  "브랜드충성": 0.15
  "충동구매":   0.10
  "신중탐색":   0.10

# 페르소나별 상세 행동 확률 및 선호 타겟
# view_to_cart   : 한 번의 트래픽이 'cart' 또는 'purchase'로 기록될 확률
# cart_to_purchase: 위 cart 중 'purchase'로 한 번 더 진행될 확률
# 결과적으로 실제 CVR ≈ view_to_cart × cart_to_purchase
persona_configs:
  "트렌드세터":
    view_to_cart: 0.15        # 15% 가 cart 단계 진입
    cart_to_purchase: 0.40    # 그 중 40% 가 구매 → 실제 CVR ≈ 6%
    target_category: "Jeans"
  "실용주의자":
    view_to_cart: 0.08
    cart_to_purchase: 0.50    # CVR ≈ 4%
    target_category: "Basic"
  "가성비추구":
    view_to_cart: 0.10
    cart_to_purchase: 0.50    # CVR ≈ 5%
    target_category: "Sale"
  "브랜드충성":
    view_to_cart: 0.12
    cart_to_purchase: 0.45    # CVR ≈ 5.4%
    target_category: "Premium"
  "충동구매":
    view_to_cart: 0.20
    cart_to_purchase: 0.30    # CVR ≈ 6%
    target_category: "Accessories"
  "신중탐색":
    view_to_cart: 0.05
    cart_to_purchase: 0.20    # CVR ≈ 1%
    target_category: "All"